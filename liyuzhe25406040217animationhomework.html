<!DOCTYPE html>
<html>
<head>
    <style>
       .box {
            width: 50px;
            height: 50px;
            background-color: blue;
            position: relative;
            animation: move 2s infinite;
        }
        @keyframes move {
            from {left: 0px;}
            to {left: 200px;}
        }
    </style>
</head>
<body>
    <div class="box"></div>
</body>
</html>
